name: Release control CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  contract:
    name: Release contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Verify release contract
        run: |
          python -m pytest tests/test_release_contract.py -q
          bash -n scripts/*.sh
